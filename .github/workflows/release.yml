name: Release

# Triggered when you push a tag like v0.1.0. Builds the wheel + sdist and
# publishes to PyPI via OIDC (no PYPI_API_TOKEN secret needed).
#
# Setup once on PyPI:
#   1. Create the project on https://pypi.org (or use TestPyPI first)
#   2. Add a "Trusted Publisher" pointing at:
#         owner: <your gh user/org>
#         repo: <this repo name>
#         workflow: release.yml
#         environment: pypi
#   3. Repo settings → Environments → create 'pypi' (no secrets needed)

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build + publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pea-audit
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
